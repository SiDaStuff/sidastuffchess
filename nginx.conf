# Example nginx configuration to serve the frontend from `public/`
# and proxy all `/api` requests to the Node.js server on port 3000.
# Adjust `root` to the absolute path where this repository is deployed.

worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  include mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name _;

    # Change this to the absolute path where this repo's `public/` folder is located.
    root /var/www/chess-review/public;
    index index.html;

    # Trust Cloudflare's X-Forwarded-For headers and restore real IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/12;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Serve static assets with long cache where appropriate
    location /assets/ {
      try_files $uri $uri/ =404;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Proxy API requests to the Node.js backend (supports websockets)
    location /api/ {
      proxy_pass http://127.0.0.1:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      # Avoid buffering for proxied websockets and streaming
      proxy_buffering off;
    }

    # Fallback to index.html for SPA routing
    location / {
      try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
  }
}
